name: Release

# Build les deux variantes (online + offline) et les publie dans la même Release.
# L'utilisateur choisit l'APK à installer depuis la page Releases GitHub.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MG4_KEYSTORE_BASE64: ${{ secrets.MG4_KEYSTORE_BASE64 }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode platform keystore
        if: ${{ env.MG4_KEYSTORE_BASE64 != '' }}
        run: |
          # Tolère retours-ligne/espaces dans le secret ; printf évite un newline parasite.
          printf '%s' "$MG4_KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > "$RUNNER_TEMP/platform.keystore"
          # Validation : un keystore PKCS12/JKS commence par 0x30 (SEQUENCE DER). Sinon secret corrompu.
          if [ "$(head -c1 "$RUNNER_TEMP/platform.keystore" | od -An -tx1 | tr -d ' ')" != "30" ]; then
            echo "::error::MG4_KEYSTORE_BASE64 invalide. Recréez le secret : base64 -w0 platform.keystore"
            exit 1
          fi
          echo "MG4_KEYSTORE=$RUNNER_TEMP/platform.keystore" >> "$GITHUB_ENV"

      - name: Build online + offline release APKs
        env:
          MG4_KEYSTORE_PASSWORD: ${{ secrets.MG4_KEYSTORE_PASSWORD }}
          MG4_KEY_ALIAS: ${{ secrets.MG4_KEY_ALIAS }}
          MG4_KEY_PASSWORD: ${{ secrets.MG4_KEY_PASSWORD }}
        run: ./gradlew assembleOnlineRelease assembleOfflineRelease --no-daemon

      - name: Collect APKs
        run: |
          mkdir -p dist
          find app/build/outputs/apk -name "MG4Control-*-*.apk" -exec cp {} dist/ \;
          ls -la dist/

      - name: Upload APKs as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mg4control-apks
          path: dist/*.apk

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Tag push -> release stable sur le tag. Run manuel -> prerelease "ci-<run>".
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('ci-{0}', github.run_number) }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('CI build {0}', github.run_number) }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          files: dist/*.apk
          body: |
            ## MG4Control ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('ci-{0}', github.run_number) }}

            Deux variantes sont fournies — **choisissez-en une** :

            | Variante | Fichier | Réseau | Auto-update | Cible |
            |---|---|---|---|---|
            | **Online** | `MG4Control-online-*.apk` | oui | oui | usage standard |
            | **Offline** 🔒 | `MG4Control-offline-*.apk` | aucun (perms réseau retirées) | non | déploiement durci sur véhicule |

            > L'APK offline a un applicationId distinct (`com.mg4.control.offline`) et peut cohabiter avec l'online.
