name: Release

# Build les deux variantes (online + offline) et les publie dans la même Release.
# L'utilisateur choisit l'APK à installer depuis la page Releases GitHub.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode platform keystore
        if: ${{ secrets.MG4_KEYSTORE_BASE64 != '' }}
        env:
          MG4_KEYSTORE_BASE64: ${{ secrets.MG4_KEYSTORE_BASE64 }}
        run: |
          echo "$MG4_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/platform.keystore"
          echo "MG4_KEYSTORE=$RUNNER_TEMP/platform.keystore" >> "$GITHUB_ENV"

      - name: Build online + offline release APKs
        env:
          MG4_KEYSTORE_PASSWORD: ${{ secrets.MG4_KEYSTORE_PASSWORD }}
          MG4_KEY_ALIAS: ${{ secrets.MG4_KEY_ALIAS }}
          MG4_KEY_PASSWORD: ${{ secrets.MG4_KEY_PASSWORD }}
        run: ./gradlew assembleOnlineRelease assembleOfflineRelease --no-daemon

      - name: Collect APKs
        run: |
          mkdir -p dist
          find app/build/outputs/apk -name "MG4Control-*-*.apk" -exec cp {} dist/ \;
          ls -la dist/

      - name: Upload APKs as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mg4control-apks
          path: dist/*.apk

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          body: |
            ## MG4Control ${{ github.ref_name }}

            Deux variantes sont fournies — **choisissez-en une** :

            | Variante | Fichier | Réseau | Auto-update | Cible |
            |---|---|---|---|---|
            | **Online** | `MG4Control-online-*.apk` | oui | oui | usage standard |
            | **Offline** 🔒 | `MG4Control-offline-*.apk` | aucun (perms réseau retirées) | non | déploiement durci sur véhicule |

            > L'APK offline a un applicationId distinct (`com.mg4.control.offline`) et peut cohabiter avec l'online.
